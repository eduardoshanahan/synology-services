services:
  app:
    image: solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}
    container_name: solidtime-app
    restart: unless-stopped
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3800}:8000"
    networks:
      - internal
      - shared-db
    volumes:
      - "solidtime_app_storage:/var/www/html/storage"
      - "./logs:/var/www/html/storage/logs"
      - "./app-storage:/var/www/html/storage/app"
    environment:
      CONTAINER_MODE: http
    env_file:
      - laravel.env
    depends_on:
      gotenberg:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8000/health-check/up
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s

  scheduler:
    image: solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}
    container_name: solidtime-scheduler
    restart: unless-stopped
    networks:
      - internal
      - shared-db
    volumes:
      - "solidtime_app_storage:/var/www/html/storage"
      - "./logs:/var/www/html/storage/logs"
      - "./app-storage:/var/www/html/storage/app"
    environment:
      CONTAINER_MODE: scheduler
    env_file:
      - laravel.env
    healthcheck:
      test:
        - CMD
        - healthcheck
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s

  queue:
    image: solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}
    container_name: solidtime-queue
    restart: unless-stopped
    networks:
      - internal
      - shared-db
    volumes:
      - "solidtime_app_storage:/var/www/html/storage"
      - "./logs:/var/www/html/storage/logs"
      - "./app-storage:/var/www/html/storage/app"
    environment:
      CONTAINER_MODE: worker
      WORKER_COMMAND: php /var/www/html/artisan queue:work
    env_file:
      - laravel.env
    healthcheck:
      test:
        - CMD
        - healthcheck
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s

  gotenberg:
    image: gotenberg/gotenberg:8.15
    container_name: solidtime-gotenberg
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test:
        - CMD
        - curl
        - --silent
        - --fail
        - http://localhost:3000/health
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s

networks:
  internal:
  shared-db:
    external: true
    name: ${SHARED_DB_NETWORK:-hhlab-shared-db}

volumes:
  solidtime_app_storage:
