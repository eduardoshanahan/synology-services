services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: nas-host-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "${MINIO_API_BIND:-0.0.0.0}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
