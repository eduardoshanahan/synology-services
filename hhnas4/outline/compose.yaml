services:
  outline:
    image: docker.getoutline.com/outlinewiki/outline:1.4.0
    container_name: outline
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - "outline_storage_data:/var/lib/outline/data"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e 'const http=require("http");const port=process.env.PORT||3010;const hostHeader=new URL(process.env.URL||"http://localhost").host;const hosts=["127.0.0.1","::1"];const probe=(i)=>{if(i>=hosts.length){process.exit(1);return;}const req=http.get({host:hosts[i],port,path:"/_health",headers:{Host:hostHeader,"X-Forwarded-Proto":"https"}},(res)=>{if(res.statusCode===200){process.exit(0);}else{probe(i+1);}});req.on("error",()=>probe(i+1));};probe(0);'
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s

volumes:
  outline_storage_data:
