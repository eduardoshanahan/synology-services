services:
  karakeep:
    image: ghcr.io/karakeep-app/karakeep@sha256:20754dbdafb11dfe288bbb1c2342a7855081b08ea069e86fcf2d4a2d945d3653
    container_name: karakeep
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MEILI_ADDR=http://karakeep-meilisearch:7700
      - BROWSER_WEB_URL=http://karakeep-chrome:9222
      - DATA_DIR=/data
      - TZ=${KARAKEEP_TIMEZONE:-UTC}
    volumes:
      - "${KARAKEEP_DATA_DIR:-./data}:/data"
    ports:
      - "${KARAKEEP_HOST_BIND:-127.0.0.1}:${KARAKEEP_PORT:-3095}:3000"
    depends_on:
      - karakeep-chrome
      - karakeep-meilisearch

  karakeep-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: karakeep-chrome
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  karakeep-meilisearch:
    image: getmeili/meilisearch:v1.13.3
    container_name: karakeep-meilisearch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MEILI_NO_ANALYTICS=true
    volumes:
      - "${KARAKEEP_MEILISEARCH_DATA_DIR:-./meilisearch}:/meili_data"
