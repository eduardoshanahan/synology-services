services:
  mysql:
    image: mysql:8.4.6
    container_name: hhnas4-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?set in .env}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-ghost}
      - MYSQL_USER=${MYSQL_USER:?set in .env}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?set in .env}
      - TZ=${MYSQL_TIMEZONE:-UTC}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-256M}
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-80}
      - --bind-address=0.0.0.0
    ports:
      - "${MYSQL_BIND:-0.0.0.0}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - "mysql_data:/var/lib/mysql"
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" || exit 1
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

volumes:
  mysql_data:
    name: ghost-mysql_ghost_mysql_data
