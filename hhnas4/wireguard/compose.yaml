services:
  wireguard:
    image: linuxserver/wireguard:1.0.20210914
    container_name: hhnas4-wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ./wg0.conf:/config/wg_confs/wg0.conf:ro
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    network_mode: host
    healthcheck:
      test: ["CMD", "sh", "-c", "wg show wg0 | grep -q interface"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
