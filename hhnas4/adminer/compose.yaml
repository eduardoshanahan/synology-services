services:
  adminer:
    image: adminer:5.4.2
    container_name: nas-host-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_BIND:-127.0.0.1}:${ADMINER_PORT:-8070}:8080"
    environment:
      - ADMINER_DESIGN=${ADMINER_DESIGN:-nette}
      - ADMINER_DEFAULT_SERVER=${ADMINER_DEFAULT_SERVER:-mysql.internal.example}
    networks:
      shared-db:
        aliases:
          - adminer

networks:
  shared-db:
    external: true
    name: ${SHARED_DB_NETWORK:-hhlab-shared-db}
