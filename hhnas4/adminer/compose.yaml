services:
  adminer:
    image: adminer:4.8.1
    container_name: hhnas4-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_BIND:-0.0.0.0}:${ADMINER_PORT:-8070}:8080"
    environment:
      - ADMINER_DESIGN=${ADMINER_DESIGN:-nette}
      - ADMINER_DEFAULT_SERVER=${ADMINER_DEFAULT_SERVER:-mysql.hhlab.home.arpa}
    networks:
      shared-db:
        aliases:
          - adminer

networks:
  shared-db:
    external: true
    name: ${SHARED_DB_NETWORK:-hhlab-shared-db}
