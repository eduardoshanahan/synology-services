services:
  postgres:
    image: postgres:17
    container_name: nas-host-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_BIND:-0.0.0.0}:${POSTGRES_PORT:-5433}:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
    command:
      - postgres
      - -c
      - "listen_addresses=${POSTGRES_LISTEN_ADDRESSES:-*}"
      - -c
      - "password_encryption=scram-sha-256"
    networks:
      shared-db:
        aliases:
          - postgres-shared
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -h 127.0.0.1 -p 5432 -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" || exit 1'
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

volumes:
  postgres_data:

networks:
  shared-db:
    external: true
    name: ${SHARED_DB_NETWORK:-hhlab-shared-db}
