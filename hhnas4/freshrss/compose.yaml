services:
  freshrss:
    image: freshrss/freshrss:1.27.1
    container_name: hhnas4-freshrss
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
    ports:
      - "${FRESHRSS_HOST_BIND:-127.0.0.1}:${FRESHRSS_HOST_PORT:-8095}:80"
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Europe/Dublin}
      - CRON_MIN=${CRON_MIN:-13,43}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-127.0.0.1/32}
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - freshrss_extensions:/var/www/FreshRSS/extensions
    healthcheck:
      test:
        - CMD
        - cli/health.php
      timeout: 10s
      start_period: 60s
      interval: 75s
      retries: 3

volumes:
  freshrss_data:
  freshrss_extensions:
