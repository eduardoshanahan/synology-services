services:
  archivebox:
    image: archivebox/archivebox@sha256:fdf2936192aa1e909b0c3f286f60174efa24078555be4b6b90a07f2cef1d4909
    container_name: archivebox
    restart: unless-stopped
    environment:
      - ALLOWED_HOSTS=${ARCHIVEBOX_ALLOWED_HOSTS:-*}
      - TZ=${ARCHIVEBOX_TIMEZONE:-UTC}
      - PUID=${PUID:-911}
      - PGID=${PGID:-911}
      - CHROME_USER_DATA_DIR=${CHROME_USER_DATA_DIR:-/data/chrome-profile}
      - COOKIES_FILE=${COOKIES_FILE:-}
      - SEARCH_BACKEND_ENGINE=${ARCHIVEBOX_SEARCH_BACKEND_ENGINE:-ripgrep}
    volumes:
      - "archivebox_data:/data"
    ports:
      - "${ARCHIVEBOX_HOST_BIND:-127.0.0.1}:${ARCHIVEBOX_PORT:-8000}:8000"
    command:
      - server
      - --quick-init
      - "0.0.0.0:8000"

volumes:
  archivebox_data:
