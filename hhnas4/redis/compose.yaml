services:
  redis:
    image: redis:7.4.2-alpine
    container_name: hhnas4-redis
    restart: unless-stopped
    ports:
      - "${REDIS_BIND:-0.0.0.0}:${REDIS_PORT:-6379}:6379"
    env_file:
      - .env
    command:
      - sh
      - -ec
      - |
        cat > /tmp/redis-users.acl <<EOF
        user default off
        user $${REDIS_ADMIN_USERNAME:?set in .env} on >$${REDIS_ADMIN_PASSWORD:?set in .env} ~* &* +@all
        user $${REDIS_OUTLINE_USERNAME:?set in .env} on >$${REDIS_OUTLINE_PASSWORD:?set in .env} ~* &* +@all -@admin -@dangerous +keys
        EOF
        exec redis-server \
          --appendonly yes \
          --bind "$${REDIS_BIND:-0.0.0.0}" \
          --port "$${REDIS_PORT:-6379}" \
          --aclfile /tmp/redis-users.acl
    volumes:
      - "redis_data:/data"
    healthcheck:
      test:
        - CMD-SHELL
        - 'redis-cli -h 127.0.0.1 -p $${REDIS_PORT:-6379} --user "$${REDIS_ADMIN_USERNAME}" --pass "$${REDIS_ADMIN_PASSWORD}" ping | grep -q PONG'
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  redis_data:
