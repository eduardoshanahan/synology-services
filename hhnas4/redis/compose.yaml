services:
  redis:
    image: redis:7.4.2-alpine
    container_name: hhnas4-redis
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --bind
      - "${REDIS_BIND:-0.0.0.0}"
      - --port
      - "${REDIS_PORT:-6379}"
      - --requirepass
      - "${REDIS_PASSWORD:?set in .env}"
    volumes:
      - "redis_data:/data"
    healthcheck:
      test:
        - CMD-SHELL
        - 'redis-cli -h 127.0.0.1 -p ${REDIS_PORT:-6379} -a "$${REDIS_PASSWORD}" ping | grep -q PONG'
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  redis_data:
