services:
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:${PAPERLESS_VERSION:-2.20.10}
    container_name: hhnas4-paperless
    restart: unless-stopped
    ports:
      - "${PAPERLESS_HOST_BIND:-127.0.0.1}:${PAPERLESS_HOST_PORT:-8010}:8000"
    env_file:
      - .env
    environment:
      - PAPERLESS_DBENGINE=postgresql
      - PAPERLESS_DBHOST=${PAPERLESS_DBHOST:?set in .env}
      - PAPERLESS_DBPORT=${PAPERLESS_DBPORT:-5433}
      - PAPERLESS_DBNAME=${PAPERLESS_DBNAME:?set in .env}
      - PAPERLESS_DBUSER=${PAPERLESS_DBUSER:?set in .env}
      - PAPERLESS_DBPASS=${PAPERLESS_DBPASS:?set in .env}
      - PAPERLESS_REDIS=${PAPERLESS_REDIS:?set in .env}
      - PAPERLESS_TIKA_ENABLED=${PAPERLESS_TIKA_ENABLED:-1}
      - PAPERLESS_TIKA_GOTENBERG_ENDPOINT=${PAPERLESS_TIKA_GOTENBERG_ENDPOINT:-http://gotenberg.internal.example:3001}
      - PAPERLESS_TIKA_ENDPOINT=${PAPERLESS_TIKA_ENDPOINT:-http://tika.internal.example:9998}
      - PAPERLESS_TIME_ZONE=${PAPERLESS_TIME_ZONE:-UTC}
      - PAPERLESS_OCR_LANGUAGE=${PAPERLESS_OCR_LANGUAGE:-eng}
    dns:
      - ${PAPERLESS_DNS:-192.0.2.10}
    networks:
      - paperless-net
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume

volumes:
  paperless_data:
  paperless_media:

networks:
  paperless-net:
    name: paperless-net
    driver: bridge
    ipam:
      config:
        - subnet: ${PAPERLESS_DOCKER_SUBNET:-172.23.0.0/16}
