repos:
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.27.0
    hooks:
      - id: gitleaks
        name: gitleaks (secrets scan)
        args: ["--pre-commit", "--config=.gitleaks.toml", "--redact", "--verbose", "--no-banner"]

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint (docs)
        entry: markdownlint-cli2 --config .markdownlint-cli2.yaml
        language: system
        files: "\\.md$"

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck (scripts)
        entry: shellcheck
        language: system
        files: "\\.sh$"

  - repo: local
    hooks:
      - id: shfmt
        name: shfmt (scripts)
        entry: shfmt -w
        language: system
        files: "\\.sh$"

  - repo: https://github.com/astro/deadnix
    rev: v1.2.1
    hooks:
      - id: deadnix
        name: deadnix (nix unused code)
